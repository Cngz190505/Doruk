<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Doruk</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: #040810;
  font-family: 'Segoe UI', sans-serif;
  color: #e8f0ff;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  min-height: 100dvh;
  background: radial-gradient(ellipse at 50% 40%, #0a1a28 0%, #070d18 60%, #040810 100%);
}

/* Arka plan partikülleri */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(0, 212, 255, 0.15);
  animation: float linear infinite;
}

.particle:nth-child(1)  { width:3px; height:3px; left:10%; animation-duration:12s; animation-delay:0s; }
.particle:nth-child(2)  { width:2px; height:2px; left:25%; animation-duration:18s; animation-delay:3s; }
.particle:nth-child(3)  { width:4px; height:4px; left:40%; animation-duration:14s; animation-delay:6s; }
.particle:nth-child(4)  { width:2px; height:2px; left:60%; animation-duration:20s; animation-delay:1s; }
.particle:nth-child(5)  { width:3px; height:3px; left:75%; animation-duration:16s; animation-delay:4s; }
.particle:nth-child(6)  { width:2px; height:2px; left:88%; animation-duration:13s; animation-delay:8s; }

@keyframes float {
  0%   { transform: translateY(110vh) scale(0); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

.content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 40px 32px;
  animation: fadeIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Logo kutusu */
.logo-wrap {
  width: 90px;
  height: 90px;
  border-radius: 26px;
  background: linear-gradient(145deg, #050c18 0%, #081420 50%, #050c18 100%);
  border: 1.5px solid rgba(0,212,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 32px;
  box-shadow: 0 0 40px rgba(0,212,255,0.08), 0 8px 32px rgba(0,0,0,0.4);
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 40px rgba(0,212,255,0.08), 0 8px 32px rgba(0,0,0,0.4); }
  50%       { box-shadow: 0 0 60px rgba(0,212,255,0.16), 0 8px 32px rgba(0,0,0,0.4); }
}

.logo-d {
  font-size: 40px;
  font-weight: 900;
  background: linear-gradient(135deg, #00d4ff 0%, #00ffcc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
}

/* Sinyal ikonu */
.signal-icon {
  width: 64px;
  height: 64px;
  margin-bottom: 24px;
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 5px;
}

.bar {
  width: 10px;
  border-radius: 4px 4px 0 0;
  background: rgba(0,212,255,0.15);
}
.bar:nth-child(1) { height: 20px; }
.bar:nth-child(2) { height: 34px; }
.bar:nth-child(3) { height: 48px; }

/* Çarpı işareti */
.signal-x {
  position: absolute;
  top: 0;
  right: -4px;
  width: 20px;
  height: 20px;
  background: #ff4664;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 900;
  color: white;
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

.title {
  font-size: 18px;
  font-weight: 900;
  color: #e8f0ff;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 13px;
  color: #4a6a8a;
  font-weight: 500;
  line-height: 1.6;
  max-width: 240px;
  margin-bottom: 36px;
}

.retry-btn {
  padding: 14px 32px;
  border-radius: 16px;
  border: 1.5px solid rgba(0,212,255,0.25);
  background: rgba(0,212,255,0.07);
  color: #00d4ff;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

.retry-btn:active {
  background: rgba(0,212,255,0.14);
  transform: scale(0.97);
}

/* Alt dot göstergesi */
.status-dot {
  margin-top: 40px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: #2a4a6a;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #ff4664;
  animation: blink 2s ease-in-out infinite;
}
</style>
</head>
<body>

<div class="particles">
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
</div>

<div class="content">
  <div class="logo-wrap">
    <span class="logo-d">D</span>
  </div>

  <div class="signal-icon">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="signal-x">✕</div>
  </div>

  <div class="title">Bağlantı Yok</div>
  <div class="subtitle">İnternet bağlantısı bulunamadı. Lütfen bağlantını kontrol et.</div>

  <button class="retry-btn" onclick="window.location.reload()">
    ↻ &nbsp;Tekrar Dene
  </button>

  <div class="status-dot">
    <div class="dot"></div>
    ÇEVRİMDIŞI
  </div>
</div>

<script>
  // İnternet gelince otomatik yönlendir
  window.addEventListener('online', () => {
    window.location.reload();
  });
</script>

</body>
</html>
